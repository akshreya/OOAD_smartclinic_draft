<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Clinic Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #fce4ec, #e3f2fd);
        }

        .navbar {
            background: linear-gradient(to right, #f48fb1, #90caf9);
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .cards {
            max-width: 1000px;
            margin: auto;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 250px;
            text-align: center;
            border-top: 6px solid #f48fb1;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #f06292;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">Smart Clinic</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/doctors">Doctors</a>
        <a href="/patients">Patients</a>
        <a href="/appointments">Appointments</a>
    </div>
</div>

<div class="hero">
    <h1>Smart Clinic Dashboard</h1>
</div>

<div class="cards">
    <div class="card">
        <h3>Doctors</h3>
        <a class="btn" href="/doctors">Go</a>
    </div>

    <div class="card">
        <h3>Patients</h3>
        <a class="btn" href="/patients">Go</a>
    </div>

    <div class="card">
        <h3>Appointments</h3>
        <a class="btn" href="/appointments">Go</a>
    </div>
</div>

</body>
</html>
