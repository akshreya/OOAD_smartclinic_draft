<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Doctor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #fce4ec, #e3f2fd);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 60px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border-top: 6px solid #f48fb1;
        }

        h2 {
            text-align: center;
            color: #d81b60;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: bold;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: linear-gradient(to right, #f06292, #ec407a);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: linear-gradient(to right, #ec407a, #d81b60);
        }

        .link {
            display: block;
            text-align: center;
            margin-top: 18px;
            text-decoration: none;
            color: #d81b60;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Edit Doctor</h2>

    <form th:action="@{/doctors/update/{id}(id=${doctor.id})}" th:object="${doctor}" method="post">
        <label>Name</label>
        <input type="text" th:field="*{name}">

        <label>Specialization</label>
        <input type="text" th:field="*{specialization}">

        <label>Email</label>
        <input type="text" th:field="*{email}">

        <label>Phone</label>
        <input type="text" th:field="*{phone}">

        <label>Available Days</label>
        <input type="text" th:field="*{availableDays}">

        <button type="submit">Update Doctor</button>
    </form>

    <a class="link" href="/doctors">Back to Doctors List</a>
</div>
</body>
</html>
